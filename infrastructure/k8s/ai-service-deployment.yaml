apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: dirapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
    spec:
      containers:
        - name: ai-service
          image: dirapp/ai-service:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: dirapp-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: dirapp
spec:
  selector:
    app: ai-service
  ports:
    - port: 8000
      targetPort: 8000
