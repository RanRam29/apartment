<script>
        function swipe(direction) {
            const card = document.getElementById('card1');
            const nextCard = document.getElementById('card2');
            
            if (!card) return;

            const rotate = direction === 'right' ? 20 : -20;
            const xMove = direction === 'right' ? 1000 : -1000;

            card.style.transform = `translate(${xMove}px, -100px) rotate(${rotate}deg)`;
            card.style.opacity = '0';

            setTimeout(() => {
                card.remove();
                if (nextCard) {
                    nextCard.style.transform = 'translateY(0) scale(1)';
                    nextCard.style.opacity = '1';
                    nextCard.classList.remove('z-20');
                    nextCard.classList.add('z-30');
                    nextCard.id = 'card1';
                }
            }, 400);
        }

        // Simple touch dragging for Tinder feel
        let startX = 0;
        const currentCard = document.getElementById('card1');

        if(currentCard) {
            currentCard.addEventListener('touchstart', (e) => {
                startX = e.touches[0].clientX;
            });

            currentCard.addEventListener('touchmove', (e) => {
                const x = e.touches[0].clientX;
                const diff = x - startX;
                const rotate = diff / 20;
                currentCard.style.transform = `translateX(${diff}px) rotate(${rotate}deg)`;
            });

            currentCard.addEventListener('touchend', (e) => {
                const diff = e.changedTouches[0].clientX - startX;
                if (Math.abs(diff) > 100) {
                    swipe(diff > 0 ? 'right' : 'left');
                } else {
                    currentCard.style.transform = 'translateX(0) rotate(0deg)';
                }
            });
        }
    </script>
