<footer class="w-full px-5xl pb-5xl flex flex-col items-center gap-4xl">
<!-- Progress Indicators -->

<div class="h-2 w-2 rounded-full bg-outline-variant transition-all duration-300" id="dot-1"></div>
<div class="h-2 w-2 rounded-full bg-outline-variant transition-all duration-300" id="dot-2"></div>
</div>
<!-- CTA Button -->
<button class="w-full bg-[#00cba9] text-white py-lg rounded-full font-subhead text-subhead shadow-lg hover:brightness-110 active:scale-95 transition-all duration-200" id="next-btn">
            המשך
        </button>
</footer>
<script>
        let currentSlide = 0;
        const track = document.getElementById('carousel-track');
        const nextBtn = document.getElementById('next-btn');
        const totalSlides = 3;

        function updateCarousel() {
            // Apply translation based on current slide
            // Slides are arranged horizontally, in RTL we move positive %
            const offset = currentSlide * (100 / totalSlides);
            track.style.transform = `translateX(${offset}%)`;

            // Update indicators
            for (let i = 0; i < totalSlides; i++) {
                const dot = document.getElementById(`dot-${i}`);
                if (i === currentSlide) {
                    dot.classList.remove('w-2', 'bg-outline-variant');
                    dot.classList.add('w-8', 'bg-secondary');
                } else {
                    dot.classList.remove('w-8', 'bg-secondary');
                    dot.classList.add('w-2', 'bg-outline-variant');
                }
            }

            // Change button text on last slide
            if (currentSlide === totalSlides - 1) {
                nextBtn.innerText = 'בואו נתחיל';
            } else {
                nextBtn.innerText = 'המשך';
            }
        }

        nextBtn.addEventListener('click', () => {
            if (currentSlide < totalSlides - 1) {
                currentSlide++;
                updateCarousel();
            } else {
                // Final action
                nextBtn.classList.add('opacity-50');
                console.log('Onboarding complete');
            }
        });

        // Swipe Support
        let startX = 0;
        let endX = 0;

        document.addEventListener('touchstart', e => {
            startX = e.touches[0].clientX;
        });

        document.addEventListener('touchend', e => {
            endX = e.changedTouches[0].clientX;
            handleSwipe();
        });

        function handleSwipe() {
            const threshold = 50;
            if (startX - endX > threshold) {
                // Swiped Left
                if (currentSlide > 0) {
                    currentSlide--;
                    updateCarousel();
                }
            } else if (endX - startX > threshold) {
                // Swiped Right
                if (currentSlide < totalSlides - 1) {
                    currentSlide++;
                    updateCarousel();
                }
            }
        }
    </script>
