<script>
        function toggleTama() {
            const btn = document.getElementById('tamaBtn');
            const layer = document.getElementById('tamaLayer');
            btn.classList.toggle('active');
            
            if (btn.classList.contains('active')) {
                layer.style.opacity = '1';
            } else {
                layer.style.opacity = '0';
            }
        }

        // Add some subtle parallax motion to map on mouse move (desktop)
        document.addEventListener('mousemove', (e) => {
            const map = document.querySelector('.map-mesh img');
            if (window.innerWidth > 768) {
                const x = (e.clientX / window.innerWidth - 0.5) * 20;
                const y = (e.clientY / window.innerHeight - 0.5) * 20;
                map.style.transform = `scale(1.1) translate(${x}px, ${y}px)`;
            }
        });
    </script>
