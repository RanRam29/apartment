<script>
        // OTP Auto-focus Logic
        const inputs = document.querySelectorAll('.otp-input');
        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value.length === 1 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && index > 0) {
                    inputs[index - 1].focus();
                }
            });
        });

        // Countdown Timer Logic
        let timeLeft = 59;
        const timerDisplay = document.getElementById('timer');
        const resendBtn = document.getElementById('resend-btn');

        const startTimer = () => {
            resendBtn.classList.add('countdown-active');
            const interval = setInterval(() => {
                if (timeLeft <= 0) {
                    clearInterval(interval);
                    timerDisplay.textContent = "";
                    resendBtn.classList.remove('countdown-active');
                    resendBtn.style.textDecoration = "underline";
                } else {
                    const seconds = timeLeft < 10 ? `0${timeLeft}` : timeLeft;
                    timerDisplay.textContent = `(00:${seconds})`;
                    timeLeft--;
                }
            }, 1000);
        };

        startTimer();

        resendBtn.addEventListener('click', () => {
            if (timeLeft <= 0) {
                timeLeft = 59;
                startTimer();
                // Add actual resend API logic here
                console.log("Resending code...");
            }
        });
    </script>
