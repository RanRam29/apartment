<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .login-card-shadow {
            box-shadow: 0px 4px 12px rgba(0, 32, 69, 0.08);
        }
        .tap-highlight-transparent {
            -webkit-tap-highlight-color: transparent;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body selection:bg-secondary-container selection:text-on-secondary-container">
<!-- Hero Background Visual -->
<div class="fixed inset-0 z-0 overflow-hidden opacity-10 pointer-events-none">
<div class="absolute top-[-10%] right-[-10%] w-[60%] h-[60%] rounded-full bg-secondary-container blur-3xl"></div>
<div class="absolute bottom-[-10%] left-[-10%] w-[50%] h-[50%] rounded-full bg-primary-fixed blur-3xl"></div>
</div>
<!-- Main Content Wrapper -->
<main class="relative z-10 min-h-screen flex flex-col items-center justify-center px-lg py-5xl">
<!-- Header / Hero Section -->
<header class="w-full max-w-md mb-3xl text-center">
<div class="inline-flex items-center justify-center w-16 h-16 mb-xl rounded-xl bg-primary text-secondary-fixed">
<span class="material-symbols-outlined text-[32px]" data-icon="apartment">apartment</span>
</div>
<h1 class="font-hero-mobile text-hero-mobile md:font-hero md:text-hero text-primary mb-sm">ברוך הבא</h1>
<p class="font-body text-body text-on-surface-variant">התחבר כדי לנהל את הנכסים שלך ב-DirApp</p>
</header>
<!-- Login Card -->
<section class="w-full max-w-md bg-surface-container-lowest login-card-shadow rounded-xl p-xl md:p-3xl border border-surface-variant">
<form class="flex flex-col gap-xl">
<!-- Email Input -->
<div class="flex flex-col gap-xs">
<label class="font-label text-label text-on-surface-variant px-xs" for="email">אימייל</label>
<div class="relative">
<input class="w-full h-12 px-lg bg-surface border border-outline rounded-lg font-body text-body focus:border-primary-fixed-dim focus:ring-2 focus:ring-primary-fixed-dim transition-all outline-none" id="email" name="email" placeholder="אימייל" type="email"/>
<span class="material-symbols-outlined absolute left-lg top-1/2 -translate-y-1/2 text-outline" data-icon="mail">mail</span>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-xs">
<label class="font-label text-label text-on-surface-variant px-xs" for="password">סיסמה</label>
<div class="relative">
<input class="w-full h-12 px-lg bg-surface border border-outline rounded-lg font-body text-body focus:border-primary-fixed-dim focus:ring-2 focus:ring-primary-fixed-dim transition-all outline-none" id="password" name="password" placeholder="סיסמה" type="password"/>
<button class="absolute left-lg top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors tap-highlight-transparent" onclick="togglePasswordVisibility()" type="button">
<span class="material-symbols-outlined" data-icon="visibility" id="password-toggle-icon">visibility</span>
</button>
</div>
<div class="flex justify-end mt-xs">
<a class="font-label text-label text-secondary hover:underline transition-all" href="#">שכחת סיסמה?</a>
</div>
</div>
<!-- Login Button -->
<button class="mt-sm h-12 bg-[#00cba9] text-white font-subhead text-subhead rounded-full shadow-lg shadow-[#00cba9]/20 hover:brightness-110 active:scale-[0.98] transition-all flex items-center justify-center gap-sm" type="submit">
                    התחבר
                    <span class="material-symbols-outlined" data-icon="login">login</span>
</button>
<!-- Divider -->
<div class="relative flex items-center py-sm">
<div class="flex-grow border-t border-outline-variant"></div>
<span class="flex-shrink mx-lg font-caption text-caption text-on-surface-variant">או</span>
<div class="flex-grow border-t border-outline-variant"></div>
</div>
<!-- Create Account Button -->
<button class="h-12 border-2 border-secondary text-secondary font-subhead text-subhead rounded-full hover:bg-secondary-container/20 active:scale-[0.98] transition-all" type="button">
                    צור חשבון חדש
                </button>
</form>
</section>
<!-- Image Decorative Content -->
<div class="mt-5xl w-full max-w-lg hidden md:block">
<div class="grid grid-cols-2 gap-lg p-lg bg-surface-container rounded-2xl border border-surface-variant">
<div class="rounded-xl overflow-hidden h-40">
<img class="w-full h-full object-cover grayscale hover:grayscale-0 transition-all duration-700" data-alt="A bright and spacious modern apartment interior in Tel Aviv, featuring high ceilings, white walls, and elegant minimalist furniture. Warm sunlight streams through large floor-to-ceiling windows, casting soft shadows across a polished wooden floor. The atmosphere is professional, clean, and trustworthy, reflecting a high-end Israeli real estate aesthetic with subtle teal accents in the decor." src="https://lh3.googleusercontent.com/aida-public/AB6AXuANeZVfvQ2ytfIMBXBrDQIzuSvnnJLzuK9rEtqYKZGR4zftZFxqGVflrHPkvwRoTJ6SnBhiArjd-dBYHa-wfYhmZrUooNdViZWcaCpNQU0pjEE7anc0nLkWki0gyQnUUdEPoBx12MhyqQGe-YWdzElsQAiSpaKyue4_FqsGzQZ4pOUCHHkXYvkmTkcot1pbugp63EVFHm9SQVn6CfmXnFpocsT3GFBstztzJ9_LMXWKuJsxZheFWjwbWrdj7tcvoD8Jwp00DiGAhM_z"/>
</div>
<div class="flex flex-col justify-center px-md">
<h3 class="font-heading text-heading text-primary mb-xs">מחפשים בית חדש?</h3>
<p class="font-caption text-caption text-on-surface-variant">אלפי שוכרים כבר מצאו את הדירה הבאה שלהם איתנו בביטחון מלא.</p>
</div>
</div>
</div>
<!-- Footer Help -->
<footer class="mt-3xl text-center">
<p class="font-caption text-caption text-on-surface-variant">
                זקוק לעזרה? 
                <a class="text-secondary font-label hover:underline" href="#">מרכז התמיכה</a>
</p>
</footer>
</main>
<script>
        function togglePasswordVisibility() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('password-toggle-icon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.textContent = 'visibility_off';
            } else {
                passwordInput.type = 'password';
                toggleIcon.textContent = 'visibility';
            }
        }

        // Simple animation on load
        document.addEventListener('DOMContentLoaded', () => {
            const card = document.querySelector('section');
            card.style.opacity = '0';
            card.style.transform = 'translateY(20px)';
            
            setTimeout(() => {
                card.style.transition = 'all 0.6s cubic-bezier(0.16, 1, 0.3, 1)';
                card.style.opacity = '1';
                card.style.transform = 'translateY(0)';
            }, 100);
        });
    </script>
</body></html>
