version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: apartment_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: apartment_db
      POSTGRES_USER: ${POSTGRES_USER:-apartment_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-apartment_pass}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-apartment_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7-jammy
    container_name: apartment_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: apartment_preferences
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-mongo_user}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-mongo_pass}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: apartment_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_pass}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_pass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: apartment_kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "29092:29092"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: apartment_zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: apartment_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: ./backend/.env
    environment:
      AI_SERVICE_URL: http://ai-service:8000
    ports:
      - "3000:3000"
    volumes:
      - ./backend/src:/app/src
    command: npm run dev

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: apartment_ai
    restart: unless-stopped
    depends_on:
      - redis
      - mongodb
    env_file: ./ai-service/.env
    ports:
      - "8000:8000"
    volumes:
      - ./ai-service/src:/app/src

volumes:
  postgres_data:
  mongo_data:
  redis_data:
