<body class="bg-surface text-on-surface min-h-screen flex flex-col items-center justify-center relative overflow-hidden">
<!-- Top Navigation Placeholder - Hidden for transactional/match screen per "Automatic Suppression" rule -->

<main class="w-full max-w-md px-margin flex flex-col items-center justify-center flex-1 z-10">

<div class="text-center mb-16">

<p class="font-body-md text-body-md text-on-surface-variant max-w-[280px] mx-auto">

<div class="absolute w-[60%] h-0.5 bg-blue-400 dark:bg-blue-500 z-0"></div>

</div>
<!-- Owner Portrait -->
<div class="absolute right-4 sm:right-10 z-10 w-28 h-28 rounded-full border-4 border-surface shadow-[0_20px_50px_rgba(0,0,0,0.15)] bg-surface-container-low overflow-hidden">
<img alt="Owner Portrait" class="w-full h-full object-cover" data-alt="A professional, high-end portrait of a sophisticated man looking directly at the camera with a welcoming yet confident smile. The background is a clean, minimalist architectural setting, softly blurred. The lighting is high-key and bright, adhering to a light-mode aesthetic. The color palette is restricted to cool blues, crisp whites, and deep blacks, evoking a sense of premium service and modernity." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAosdCW3PKPCSfEMLUJEfI-zMW4SUAh3ojiemwKXE8FKctb1z8ZbC5nyfWS9dZ4sNcVV0BLaX8C5z4KIkbff_xKSUKr382eIzdE3QWqau0NR24myu3ZGMNnH1wxPoClkGX-J5kUsn6OpdGIwN5oPwKISjkX1_fG9e8Gmm6iLWrC4WlbPxDarXTZVf3e0X708pAnk-JnCv72GyS9T080fLAp4jPX5nV0fkG9QkT6GMJ8rX3Y-Bz28z6qAA8JsowkphTVJ3LUUIhTWkZK"/>
</div>
</div>
<!-- Action Area (Thumb Zone) -->
<div class="w-full flex flex-col gap-4 mt-8">
<button class="w-full py-4 px-6 rounded-full bg-blue-500 text-white font-label-bold text-label-bold flex items-center justify-center gap-2 shadow-[0_8px_20px_rgba(59,130,246,0.25)] hover:bg-blue-600 transition-colors">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">chat_bubble</span>
                Contact Owner
            </button>
<button class="w-full py-4 px-6 rounded-full bg-surface-container-high text-on-surface font-label-bold text-label-bold hover:bg-surface-variant transition-colors">
                Keep Browsing

</div>

<!-- Bottom Navigation - Suppressed for this transactional screen -->
