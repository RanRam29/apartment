<!DOCTYPE html>

<html dir="rtl" lang="he"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Seeker Onboarding - Step 1</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="../../tokens/tailwind.browser.js"></script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        
        /* Custom range slider styling for Webkit */
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 24px;
            width: 24px;
            border-radius: 50%;
            background: #162839;
            cursor: pointer;
            margin-top: -10px;
            box-shadow: 0 4px 10px rgba(22, 40, 57, 0.2);
            border: 2px solid #ffffff;
        }
        
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: #e4e2e3;
            border-radius: 2px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md h-screen flex flex-col antialiased">
<!-- Progress Indicator Header -->
<header class="w-full px-margin pt-8 pb-4 flex flex-col gap-4 sticky top-0 bg-background/90 backdrop-blur-md z-10">
<div class="flex justify-between items-center w-full">
<button aria-label="Go back" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-high transition-colors text-primary">
<span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
<div class="font-caption text-caption text-outline">שלב 1 מתוך 3</div>
<div class="w-10"></div> <!-- Spacer for centering -->
</div>
<!-- Progress Bar -->
<div class="w-full h-1 bg-surface-container-highest rounded-full overflow-hidden">
<div class="h-full bg-primary w-1/3 rounded-full transition-all duration-500 ease-in-out"></div>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 overflow-y-auto px-margin py-8 flex flex-col gap-section-gap pb-32">
<!-- Step Title -->
<div class="flex flex-col gap-2">
<h1 class="font-display-lg text-display-lg text-primary">מה התקציב והאזור שלך?</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">הגדרת הציפיות שלך תעזור לנו למצוא את הנכסים המדויקים ביותר.</p>
</div>
<!-- Budget Section -->
<section class="flex flex-col gap-6 bg-surface-container-lowest p-6 rounded-xl border border-outline-variant/30 shadow-[0_8px_24px_rgba(22,40,57,0.04)]">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-on-tertiary-container" data-icon="payments">payments</span>
<h2 class="font-headline-md text-headline-md text-primary">תקציב חודשי</h2>
</div>
<div class="flex flex-col gap-8">
<!-- Value Display -->
<div class="flex justify-between items-center">
<div class="flex flex-col">
<span class="font-caption text-caption text-outline">מינימום</span>
<span class="font-label-bold text-label-bold text-on-surface">₪ 2,000</span>
</div>
<div class="flex flex-col text-left">
<span class="font-caption text-caption text-outline">מקסימום</span>
<span class="font-label-bold text-label-bold text-on-surface">₪ 12,500</span>
</div>
</div>
<!-- Dual Range Slider Simulation (Visual representation for design purposes) -->
<div class="relative w-full h-8 flex items-center">
<!-- Background Track -->
<div class="absolute w-full h-1 bg-surface-container-high rounded-full"></div>
<!-- Active Track -->
<div class="absolute h-1 bg-primary rounded-full" style="left: 0%; right: 35%;"></div>
<!-- Thumb Min -->
<div class="absolute w-6 h-6 bg-primary rounded-full border-2 border-surface-container-lowest shadow-[0_4px_10px_rgba(22,40,57,0.2)] flex items-center justify-center cursor-pointer" style="right: 0%; transform: translateX(50%);">
<div class="w-1.5 h-1.5 bg-surface-container-lowest rounded-full"></div>
</div>
<!-- Thumb Max -->
<div class="absolute w-6 h-6 bg-primary rounded-full border-2 border-surface-container-lowest shadow-[0_4px_10px_rgba(22,40,57,0.2)] flex items-center justify-center cursor-pointer" style="left: 35%; transform: translateX(-50%);">
<div class="w-1.5 h-1.5 bg-surface-container-lowest rounded-full"></div>
</div>
</div>
</div>
</section>
<!-- Neighborhood Section -->
<section class="flex flex-col gap-6">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-on-tertiary-container" data-icon="location_city">location_city</span>
<h2 class="font-headline-md text-headline-md text-primary">אזורים מועדפים</h2>
</div>
<!-- Search/Filter Input -->
<div class="relative w-full">
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-outline" data-icon="search">search</span>
<input class="w-full bg-surface-container-lowest border border-outline-variant/50 rounded-lg py-4 pr-12 pl-4 font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors" placeholder="חיפוש עיר או שכונה..." type="text"/>
</div>
<!-- Chips Grid -->
<div class="flex flex-wrap gap-3">
<!-- Selected Chip -->
<button class="px-5 py-2.5 rounded-full border border-primary bg-primary text-on-primary font-label-bold text-label-bold flex items-center gap-2 transition-all hover:bg-primary/90 shadow-[0_4px_12px_rgba(22,40,57,0.15)]">
<span>תל אביב</span>
<span class="material-symbols-outlined text-[16px]" data-icon="close">close</span>
</button>
<!-- Selected Chip -->
<button class="px-5 py-2.5 rounded-full border border-primary bg-primary text-on-primary font-label-bold text-label-bold flex items-center gap-2 transition-all hover:bg-primary/90 shadow-[0_4px_12px_rgba(22,40,57,0.15)]">
<span>הרצליה</span>
<span class="material-symbols-outlined text-[16px]" data-icon="close">close</span>
</button>
<!-- Unselected Chips -->
<button class="px-5 py-2.5 rounded-full border border-outline-variant bg-surface-container-lowest text-on-surface-variant font-label-bold text-label-bold transition-all hover:border-outline hover:bg-surface-container-low">
                    רמת גן
                </button>
<button class="px-5 py-2.5 rounded-full border border-outline-variant bg-surface-container-lowest text-on-surface-variant font-label-bold text-label-bold transition-all hover:border-outline hover:bg-surface-container-low">
                    גבעתיים
                </button>
<button class="px-5 py-2.5 rounded-full border border-outline-variant bg-surface-container-lowest text-on-surface-variant font-label-bold text-label-bold transition-all hover:border-outline hover:bg-surface-container-low">
                    רמת השרון
                </button>
<button class="px-5 py-2.5 rounded-full border border-outline-variant bg-surface-container-lowest text-on-surface-variant font-label-bold text-label-bold transition-all hover:border-outline hover:bg-surface-container-low">
                    פתח תקווה
                </button>
</div>
<!-- Map Visualization (Decorative/Contextual) -->
<div class="w-full h-40 rounded-xl overflow-hidden border border-outline-variant/30 mt-2 relative">
<div class="absolute inset-0 bg-primary/5 z-10 mix-blend-multiply pointer-events-none"></div>
<img alt="Map area selection" class="w-full h-full object-cover opacity-80" data-alt="A high-end, minimalist satellite or stylized map view of an urban coastal city area. The image should feature a bright, light-mode aesthetic with soft greys, clean white expanses, and subtle accents of deep navy blue or slate representing water. The mood is sophisticated and clear, typical of luxury real estate interfaces." src="https://lh3.googleusercontent.com/aida-public/AB6AXuD3_KKZHeNpZQpP8HaKH9qVAVZkAAn9-nZtJEyRmoBYCs_Ld9uTqjlMxlUNg_VoG3QlvqFeJAkcMZn9S6mK8Yf0_6Lr-tFGfm4MkNtE2ShKTF75R4i_ZWEVNTPIaWG9QjgsI6I4IWn467DEYP_OlB0CeKCaqSHHdCjfwdRoCXZdJjQfbVs3UZz3E3hlD7Jxvcfpiig--X1WcihA2i3THDHFVXuLHgjjONrXDZ9uuK5H-xInWmYm3muQ4_bKl8q3Ch-WxyH6jOEvtTTN"/>
<!-- Overlay markers -->
<div class="absolute top-1/2 left-1/3 w-4 h-4 bg-primary rounded-full border-2 border-white shadow-lg z-20"></div>
<div class="absolute top-1/3 left-1/2 w-4 h-4 bg-primary rounded-full border-2 border-white shadow-lg z-20"></div>
</div>
</section>
</main>
<!-- Bottom Action Zone -->
<div class="fixed bottom-0 left-0 w-full h-thumb-zone-height bg-gradient-to-t from-background via-background/90 to-transparent pointer-events-none flex items-end justify-center pb-8 px-margin z-40">
<button class="w-full max-w-md bg-primary text-on-primary py-4 rounded-xl font-headline-md text-headline-md shadow-[0_8px_20px_rgba(22,40,57,0.15)] hover:bg-primary/90 transition-all pointer-events-auto flex items-center justify-center gap-3">
<span>המשך לשלב הבא</span>
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
</div>
</body></html>
