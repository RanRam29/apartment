<span class="px-3 py-1.5 rounded-full bg-white/10 backdrop-blur-md border border-white/20 font-caption text-caption">6 Baths</span>
<span class="px-3 py-1.5 rounded-full bg-white/10 backdrop-blur-md border border-white/20 font-caption text-caption">Infinity Pool</span>

</div>
