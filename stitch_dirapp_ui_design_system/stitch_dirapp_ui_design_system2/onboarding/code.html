<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>DirApp - Onboarding</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary": "#a43a3d",
                        "on-surface-variant": "#43474c",
                        "error-container": "#ffdad6",
                        "surface-bright": "#fbf9fa",
                        "primary-container": "#2c3e50",
                        "on-primary": "#ffffff",
                        "inverse-on-surface": "#f2f0f2",
                        "on-tertiary-container": "#c1a17d",
                        "tertiary-fixed-dim": "#e3c19b",
                        "surface-variant": "#e4e2e3",
                        "on-surface": "#1b1c1d",
                        "error": "#ba1a1a",
                        "tertiary-fixed": "#ffddb7",
                        "surface-container-low": "#f5f3f4",
                        "secondary-fixed-dim": "#ffb3b1",
                        "secondary-fixed": "#ffdad8",
                        "on-tertiary-fixed-variant": "#5a4225",
                        "on-primary-fixed": "#091d2e",
                        "outline-variant": "#c4c6cd",
                        "on-background": "#1b1c1d",
                        "primary-fixed": "#d1e4fb",
                        "on-error": "#ffffff",
                        "secondary-container": "#ff7f7f",
                        "surface-container": "#efedef",
                        "tertiary-container": "#4e381c",
                        "primary": "#162839",
                        "surface-container-highest": "#e4e2e3",
                        "tertiary": "#362308",
                        "background": "#fbf9fa",
                        "surface": "#fbf9fa",
                        "surface-container-high": "#e9e8e9",
                        "inverse-surface": "#303032",
                        "on-secondary-fixed": "#410007",
                        "on-error-container": "#93000a",
                        "on-secondary": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "on-primary-container": "#96a9be",
                        "inverse-primary": "#b5c8df",
                        "on-secondary-fixed-variant": "#842228",
                        "primary-fixed-dim": "#b5c8df",
                        "surface-dim": "#dbd9db",
                        "outline": "#74777d",
                        "surface-container-lowest": "#ffffff",
                        "on-primary-fixed-variant": "#36485b",
                        "on-secondary-container": "#74161e",
                        "on-tertiary-fixed": "#291802",
                        "surface-tint": "#4e6073"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "margin": "24px",
                        "grid-columns": "4",
                        "gutter": "20px",
                        "section-gap": "48px",
                        "thumb-zone-height": "33%"
                    },
                    "fontFamily": {
                        "display-lg": ["Assistant"],
                        "body-lg": ["Assistant"],
                        "body-md": ["Assistant"],
                        "headline-md": ["Assistant"],
                        "label-bold": ["Assistant"],
                        "caption": ["Assistant"]
                    },
                    "fontSize": {
                        "display-lg": ["32px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "300" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "body-md": ["16px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "headline-md": ["24px", { "lineHeight": "1.3", "fontWeight": "700" }],
                        "label-bold": ["14px", { "lineHeight": "1.2", "fontWeight": "700" }],
                        "caption": ["12px", { "lineHeight": "1.4", "letterSpacing": "0.05em", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
        .thumb-zone {
            bottom: 0;
            height: 33vh;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col relative overflow-hidden">
<!-- Top Navigation Placeholder (Hidden for Transactional/Onboarding Intent) -->
<!-- Content Canvas -->
<main class="flex-1 px-margin pt-16 flex flex-col items-center text-center">
<h1 class="font-display-lg text-display-lg text-primary mb-2">Welcome to DirApp</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-sm mx-auto mb-12">Discover properties effortlessly. Just swipe to curate your perfect list.</p>
<!-- Minimalist Line Art Grid -->
<div class="grid grid-cols-1 md:grid-cols-3 gap-gutter w-full max-w-4xl mx-auto mb-section-gap px-4">
<!-- Swipe Left -->
<div class="flex flex-col items-center">
<div class="w-32 h-48 bg-surface-container rounded-xl flex items-center justify-center mb-4 relative shadow-[0_20px_50px_rgba(0,0,0,0.05)] border border-outline-variant/30">
<span class="material-symbols-outlined text-[48px] text-secondary absolute top-1/2 left-4 -translate-y-1/2" data-icon="swipe_left">swipe_left</span>
<div class="w-24 h-32 border-2 border-outline/20 rounded-lg absolute"></div>
</div>
<h2 class="font-headline-md text-headline-md text-on-surface mb-2">Pass</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Swipe left to dismiss properties that don't fit.</p>
</div>
<!-- View Details (Center Focus) -->
<div class="flex flex-col items-center">
<div class="w-32 h-48 bg-surface-container rounded-xl flex items-center justify-center mb-4 relative shadow-[0_20px_50px_rgba(0,0,0,0.05)] border border-outline-variant/30 scale-110 z-10">
<span class="material-symbols-outlined text-[48px] text-primary" data-icon="touch_app">touch_app</span>
<div class="w-24 h-32 border-2 border-primary/20 rounded-lg absolute bg-primary-fixed/10"></div>
</div>
<h2 class="font-headline-md text-headline-md text-on-surface mb-2">Explore</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Tap to dive deep into property details.</p>
</div>
<!-- Swipe Right -->
<div class="flex flex-col items-center">
<div class="w-32 h-48 bg-surface-container rounded-xl flex items-center justify-center mb-4 relative shadow-[0_20px_50px_rgba(0,0,0,0.05)] border border-outline-variant/30">
<span class="material-symbols-outlined text-[48px] text-blue-500 absolute top-1/2 right-4 -translate-y-1/2" data-icon="swipe_right">swipe_right</span>
<div class="w-24 h-32 border-2 border-outline/20 rounded-lg absolute"></div>
</div>
<h2 class="font-headline-md text-headline-md text-on-surface mb-2">Save</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Swipe right to favorite and save for later.</p>
</div>
</div>
</main>
<!-- Thumb Zone / Fixed Bottom Area -->
<div class="fixed w-full thumb-zone flex flex-col items-center justify-end pb-margin px-margin bg-gradient-to-t from-background via-background to-transparent z-40">
<!-- Progress Dots -->
<div class="flex gap-2 mb-8">
<div class="w-2 h-2 rounded-full bg-outline-variant"></div>
<div class="w-2 h-2 rounded-full bg-primary w-6 transition-all"></div>
<div class="w-2 h-2 rounded-full bg-outline-variant"></div>
</div>
<!-- CTA Button -->
<button class="w-full max-w-md bg-primary text-on-primary font-label-bold text-label-bold py-4 rounded-full shadow-[0_8px_20px_rgba(22,40,57,0.12)] hover:opacity-90 transition-opacity">
            Start Sliding
        </button>
<button class="mt-4 font-caption text-caption text-on-surface-variant hover:text-primary transition-colors">
            Skip Intro
        </button>
</div>
</body></html>
