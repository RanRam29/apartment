<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Add Property - Step 1</title>

                        "on-tertiary-container": "#c1a17d",
                        "primary-fixed-dim": "#b5c8df",

                        "on-primary-container": "#96a9be",
                        "inverse-primary": "#b5c8df",
                        "secondary": "#a43a3d",

                        "background": "#fbf9fa",
                        "surface-tint": "#4e6073",

                        "inverse-surface": "#303032",
                        "tertiary-fixed-dim": "#e3c19b",
                        "on-surface-variant": "#43474c",
                        "surface-container-low": "#f5f3f4",
                        "on-background": "#1b1c1d",
                        "surface": "#fbf9fa",
                        "inverse-on-surface": "#f2f0f2",
                        "on-secondary": "#ffffff",
                        "surface-dim": "#dbd9db",
                        "tertiary": "#362308",
                        "error-container": "#ffdad6",

                    },
                    "borderRadius": {

                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "thumb-zone-height": "33%",
                        "grid-columns": "4",
                        "gutter": "20px",
                        "section-gap": "48px",
                        "margin": "24px"
                    },
                    "fontFamily": {
                        "headline-md": ["Assistant"],
                        "caption": ["Assistant"],
                        "body-md": ["Assistant"],
                        "label-bold": ["Assistant"],

    body {
      min-height: max(884px, 100dvh);

<body class="bg-surface-bright text-on-surface antialiased font-body-md h-screen flex flex-col overflow-hidden selection:bg-primary-fixed selection:text-on-primary-fixed">
<!-- Wizard Header: Transactional layout overrides standard shell -->
<header class="flex justify-between items-center px-margin py-6 shrink-0">
<button aria-label="Cancel" class="w-10 h-10 flex items-center justify-center rounded-full bg-surface-container-low text-on-surface hover:bg-surface-variant transition-colors">
<span class="material-symbols-outlined text-[20px]">close</span>
</button>
<div class="font-label-bold text-label-bold text-on-surface-variant uppercase tracking-widest text-[10px]">Step 1 of 4</div>
<button class="font-label-bold text-label-bold text-primary hover:opacity-70 transition-opacity px-2">Save</button>
</header>
<!-- Visual Stepper -->
<div class="px-margin mb-8 shrink-0">
<div class="flex gap-2 w-full h-1 bg-surface-container rounded-full overflow-hidden">
<div class="h-full bg-primary w-1/4 rounded-full"></div>
<div class="h-full bg-surface-variant w-1/4 rounded-full"></div>
<div class="h-full bg-surface-variant w-1/4 rounded-full"></div>
<div class="h-full bg-surface-variant w-1/4 rounded-full"></div>
</div>
</div>
<!-- Main Content Canvas -->
<main class="flex-1 overflow-y-auto px-margin pb-32 no-scrollbar">
<div class="mb-section-gap">
<h1 class="font-display-lg text-display-lg text-on-surface mb-3">Basic Details</h1>
<p class="font-body-md text-body-md text-on-surface-variant max-w-sm">Establish the core identity of your property listing.</p>
</div>
<form class="flex flex-col gap-section-gap">
<!-- Property Type: Asymmetric Bento Layout -->
<section>
<h2 class="font-headline-md text-headline-md text-on-surface mb-6">Property Type</h2>
<div class="grid grid-cols-2 gap-4">
<label class="cursor-pointer relative group">
<input checked="" class="peer sr-only" name="property_type" type="radio" value="apartment"/>
<div class="p-6 h-32 border border-outline-variant/30 rounded-xl flex flex-col justify-between peer-checked:border-primary peer-checked:bg-surface-container-low transition-all bg-surface-container-lowest shadow-sm hover:shadow-md">
<span class="material-symbols-outlined text-[28px] text-on-surface-variant peer-checked:text-primary transition-colors" style="font-variation-settings: 'FILL' 0;">apartment</span>
<span class="font-label-bold text-label-bold text-on-surface">Apartment</span>
</div>
</label>
<label class="cursor-pointer relative group">
<input class="peer sr-only" name="property_type" type="radio" value="studio"/>
<div class="p-6 h-32 border border-outline-variant/30 rounded-xl flex flex-col justify-between peer-checked:border-primary peer-checked:bg-surface-container-low transition-all bg-surface-container-lowest shadow-sm hover:shadow-md">
<span class="material-symbols-outlined text-[28px] text-on-surface-variant peer-checked:text-primary transition-colors" style="font-variation-settings: 'FILL' 0;">weekend</span>
<span class="font-label-bold text-label-bold text-on-surface">Studio</span>
</div>
</label>
<label class="cursor-pointer relative group col-span-2">
<input class="peer sr-only" name="property_type" type="radio" value="roommates"/>
<div class="p-6 h-24 border border-outline-variant/30 rounded-xl flex flex-row items-center gap-6 peer-checked:border-primary peer-checked:bg-surface-container-low transition-all bg-surface-container-lowest shadow-sm hover:shadow-md">
<span class="material-symbols-outlined text-[28px] text-on-surface-variant peer-checked:text-primary transition-colors" style="font-variation-settings: 'FILL' 0;">group</span>
<div class="flex flex-col">
<span class="font-label-bold text-label-bold text-on-surface">Shared Space</span>
<span class="font-caption text-caption text-on-surface-variant mt-1">Looking for roommates</span>
</div>
</div>
</label>
</div>
</section>
<!-- Precise Address: Floating Label Input -->
<section>
<div class="flex justify-between items-end mb-6">
<h2 class="font-headline-md text-headline-md text-on-surface">Location</h2>
<span class="flex items-center gap-1 font-caption text-caption text-on-surface-variant bg-surface-container-low px-2 py-1 rounded-full">
<span class="material-symbols-outlined text-[14px]">lock</span>
                        Private
                    </span>
</div>
<div class="relative bg-surface-container-lowest border border-outline-variant/30 rounded-xl shadow-sm focus-within:border-primary focus-within:ring-1 focus-within:ring-primary transition-all">
<input class="peer w-full bg-transparent border-none px-5 pt-7 pb-3 text-on-surface font-body-md focus:ring-0 placeholder-transparent" id="address" placeholder="Full Street Address" type="text"/>
<label class="absolute left-5 top-3 font-caption text-caption text-on-surface-variant transition-all peer-placeholder-shown:top-5 peer-placeholder-shown:text-body-md peer-placeholder-shown:font-body-md peer-focus:top-3 peer-focus:text-caption peer-focus:font-caption pointer-events-none" for="address">Full Street Address</label>
</div>
<p class="font-caption text-caption text-on-surface-variant mt-3 ml-2">Exact address is only shared after a booking is confirmed.</p>
</section>
<!-- Size & Layout: Side-by-side Inputs -->
<section>
<h2 class="font-headline-md text-headline-md text-on-surface mb-6">Dimensions</h2>
<div class="grid grid-cols-2 gap-4">
<div class="relative bg-surface-container-lowest border border-outline-variant/30 rounded-xl shadow-sm focus-within:border-primary focus-within:ring-1 focus-within:ring-primary transition-all">
<input class="peer w-full bg-transparent border-none px-5 pt-7 pb-3 text-on-surface font-body-md focus:ring-0 placeholder-transparent" id="sqm" placeholder="Square Meters" type="number"/>
<label class="absolute left-5 top-3 font-caption text-caption text-on-surface-variant transition-all peer-placeholder-shown:top-5 peer-placeholder-shown:text-body-md peer-placeholder-shown:font-body-md peer-focus:top-3 peer-focus:text-caption peer-focus:font-caption pointer-events-none" for="sqm">Size (sqm)</label>
</div>
<div class="relative bg-surface-container-lowest border border-outline-variant/30 rounded-xl shadow-sm focus-within:border-primary focus-within:ring-1 focus-within:ring-primary transition-all">
<div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-on-surface-variant">
<span class="material-symbols-outlined text-[20px]">meeting_room</span>
</div>
<select class="peer w-full bg-transparent border-none px-5 pt-7 pb-3 text-on-surface font-body-md focus:ring-0 appearance-none cursor-pointer" id="rooms">
<option disabled="" hidden="" selected="" value=""></option>
<option value="1">1 Room</option>
<option value="2">2 Rooms</option>
<option value="3">3 Rooms</option>
<option value="4+">4+ Rooms</option>
</select>
<label class="absolute left-5 top-3 font-caption text-caption text-on-surface-variant transition-all peer-focus:top-3 peer-focus:text-caption peer-focus:font-caption pointer-events-none" for="rooms">Total Rooms</label>
</div>
</div>
</section>
</form>
</main>
<!-- Fixed Action Bar (Thumb Zone) -->
<div class="fixed bottom-0 left-0 w-full p-margin bg-surface-bright/90 backdrop-blur-xl border-t border-surface-container z-50">
<button class="w-full bg-primary text-on-primary font-label-bold text-label-bold py-4 rounded-full shadow-[0_8px_20px_rgba(22,40,57,0.15)] hover:bg-primary-container hover:text-on-primary-container transition-all flex justify-center items-center gap-2 group">
            Continue to Photos
            <span class="material-symbols-outlined text-[20px] group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</div>
<style>
        /* Hide scrollbar for a cleaner minimal look while allowing scroll */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</body></html>
