<!DOCTYPE html>

<html dir="rtl" lang="he"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>DirApp - Add Property - Pricing &amp; Dates</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-variant": "#e4e2e3",
                        "secondary": "#a43a3d",
                        "on-secondary-fixed-variant": "#842228",
                        "on-primary-container": "#96a9be",
                        "on-tertiary-fixed": "#291802",
                        "error-container": "#ffdad6",
                        "tertiary": "#362308",
                        "inverse-on-surface": "#f2f0f2",
                        "on-secondary-container": "#74161e",
                        "on-tertiary-fixed-variant": "#5a4225",
                        "on-error-container": "#93000a",
                        "inverse-primary": "#b5c8df",
                        "secondary-container": "#ff7f7f",
                        "on-error": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "on-primary": "#ffffff",
                        "on-surface": "#1b1c1d",
                        "error": "#ba1a1a",
                        "on-secondary-fixed": "#410007",
                        "surface-container-lowest": "#ffffff",
                        "background": "#fbf9fa",
                        "outline": "#74777d",
                        "inverse-surface": "#303032",
                        "on-background": "#1b1c1d",
                        "tertiary-container": "#4e381c",
                        "primary-fixed": "#d1e4fb",
                        "on-primary-fixed": "#091d2e",
                        "surface-container-low": "#f5f3f4",
                        "surface-container-high": "#e9e8e9",
                        "surface-tint": "#4e6073",
                        "surface-container": "#efedef",
                        "on-tertiary-container": "#c1a17d",
                        "surface": "#fbf9fa",
                        "secondary-fixed-dim": "#ffb3b1",
                        "surface-container-highest": "#e4e2e3",
                        "on-secondary": "#ffffff",
                        "surface-dim": "#dbd9db",
                        "secondary-fixed": "#ffdad8",
                        "primary-fixed-dim": "#b5c8df",
                        "primary": "#162839",
                        "on-surface-variant": "#43474c",
                        "outline-variant": "#c4c6cd",
                        "tertiary-fixed-dim": "#e3c19b",
                        "primary-container": "#2c3e50",
                        "tertiary-fixed": "#ffddb7",
                        "surface-bright": "#fbf9fa",
                        "on-primary-fixed-variant": "#36485b"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "gutter": "20px",
                        "thumb-zone-height": "33%",
                        "margin": "24px",
                        "section-gap": "48px",
                        "grid-columns": "4"
                    },
                    "fontFamily": {
                        "display-lg": ["Assistant"],
                        "caption": ["Assistant"],
                        "body-md": ["Assistant"],
                        "label-bold": ["Assistant"],
                        "headline-md": ["Assistant"],
                        "body-lg": ["Assistant"]
                    },
                    "fontSize": {
                        "display-lg": ["32px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "300" }],
                        "caption": ["12px", { "lineHeight": "1.4", "letterSpacing": "0.05em", "fontWeight": "400" }],
                        "body-md": ["16px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "label-bold": ["14px", { "lineHeight": "1.2", "fontWeight": "700" }],
                        "headline-md": ["24px", { "lineHeight": "1.3", "fontWeight": "700" }],

                }
            }
        }

<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md">
<!-- TopAppBar -->
<header class="bg-surface/80 backdrop-blur-md flex justify-between items-center w-full px-6 py-4 border-b border-outline-variant/30 sticky top-0 z-50">
<button aria-label="חזור" class="text-primary p-2 hover:bg-surface-variant rounded-full transition-colors">
<span class="material-symbols-outlined font-label-bold text-label-bold">arrow_forward</span>
</button>
<span class="font-label-bold text-label-bold text-primary">שלב 2 מתוך 5</span>
<div class="w-10"></div> <!-- Placeholder for balance -->
</header>
<main class="flex-grow px-margin pt-8 pb-32 max-w-lg mx-auto w-full flex flex-col gap-section-gap">
<section>
<h1 class="font-display-lg text-display-lg text-primary mb-2">תמחור ותאריכים</h1>
<p class="font-body-md text-body-md text-on-surface-variant">הזן את פרטי התשלום ותאריך הכניסה.</p>
</section>
<section class="flex flex-col gap-6">
<!-- Monthly Rent -->
<div class="relative">
<label class="font-label-bold text-label-bold text-primary block mb-2" for="monthly-rent">שכר דירה חודשי</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute right-4 text-on-surface-variant pointer-events-none">payments</span>
<input class="w-full bg-surface-container-highest border border-outline-variant rounded-xl py-4 pr-12 pl-4 text-primary font-body-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all" id="monthly-rent" placeholder="0" type="number"/>
<span class="absolute left-4 text-on-surface-variant font-body-md pointer-events-none">₪</span>
</div>
</div>
<!-- Maintenance/Building fee -->
<div class="relative">
<label class="font-label-bold text-label-bold text-primary block mb-2" for="maintenance-fee">ועד בית</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute right-4 text-on-surface-variant pointer-events-none">cleaning_services</span>
<input class="w-full bg-surface-container-highest border border-outline-variant rounded-xl py-4 pr-12 pl-4 text-primary font-body-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all" id="maintenance-fee" placeholder="0" type="number"/>
<span class="absolute left-4 text-on-surface-variant font-body-md pointer-events-none">₪</span>
</div>
</div>
<!-- Property Tax -->
<div class="relative">
<label class="font-label-bold text-label-bold text-primary block mb-2" for="property-tax">ארנונה (לחודשיים)</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute right-4 text-on-surface-variant pointer-events-none">account_balance</span>
<input class="w-full bg-surface-container-highest border border-outline-variant rounded-xl py-4 pr-12 pl-4 text-primary font-body-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all" id="property-tax" placeholder="0" type="number"/>
<span class="absolute left-4 text-on-surface-variant font-body-md pointer-events-none">₪</span>
</div>
</div>
<!-- Entry Date -->
<div class="relative mt-4">
<label class="font-label-bold text-label-bold text-primary block mb-2" for="entry-date">תאריך כניסה</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute right-4 text-on-surface-variant pointer-events-none">calendar_month</span>
<input class="w-full bg-surface-container-highest border border-outline-variant rounded-xl py-4 pr-12 pl-4 text-primary font-body-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all appearance-none cursor-pointer" id="entry-date" type="date"/>
</div>
</div>
</section>
</main>
<!-- Bottom Action Area -->
<div class="fixed bottom-0 left-0 w-full bg-surface/90 backdrop-blur-xl border-t border-outline-variant/30 px-margin py-6 z-40">
<div class="max-w-lg mx-auto">
<button class="w-full bg-primary text-on-primary font-label-bold text-label-bold py-4 rounded-full hover:opacity-90 transition-opacity shadow-[0_8px_20px_rgba(22,40,57,0.15)] flex justify-center items-center gap-2">
                המשך למאפיינים
                <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">arrow_back</span>
</button>
</div>
</div>
</body></html>
