name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    name: Build & push Docker images
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/dirapp-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/dirapp-backend:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/dirapp-backend:latest
          cache-to: type=inline

      - name: Build & push AI service
        uses: docker/build-push-action@v5
        with:
          context: ./ai-service
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/dirapp-ai:latest
            ${{ secrets.DOCKER_USERNAME }}/dirapp-ai:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/dirapp-ai:latest
          cache-to: type=inline

  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: echo "${{ secrets.KUBECONFIG }}" | base64 -d > kubeconfig.yaml

      - name: Update image tags
        run: |
          kubectl --kubeconfig kubeconfig.yaml set image \
            deployment/backend backend=${{ secrets.DOCKER_USERNAME }}/dirapp-backend:${{ github.sha }} \
            -n dirapp
          kubectl --kubeconfig kubeconfig.yaml set image \
            deployment/ai-service ai-service=${{ secrets.DOCKER_USERNAME }}/dirapp-ai:${{ github.sha }} \
            -n dirapp

      - name: Wait for rollout
        run: |
          kubectl --kubeconfig kubeconfig.yaml rollout status deployment/backend -n dirapp --timeout=120s
          kubectl --kubeconfig kubeconfig.yaml rollout status deployment/ai-service -n dirapp --timeout=120s
