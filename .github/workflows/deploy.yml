# Disabled automatic deploy on push to avoid GitHub Actions quota limits.
# Run manually from Actions → Deploy to Production → Run workflow.
name: Deploy to Production

on:
  workflow_dispatch:

# GHCR push uses the default GITHUB_TOKEN (no Docker Hub secrets required).
permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build & push Docker images
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    outputs:
      backend_image: ${{ steps.meta.outputs.backend }}
      ai_image: ${{ steps.meta.outputs.ai }}

    steps:
      - uses: actions/checkout@v4

      - name: Compute GHCR image names (lowercase)
        id: meta
        shell: bash
        run: |
          owner="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          name="$(echo '${{ github.event.repository.name }}' | tr '[:upper:]' '[:lower:]')"
          echo "backend=ghcr.io/${owner}/${name}/dirapp-backend" >> "$GITHUB_OUTPUT"
          echo "ai=ghcr.io/${owner}/${name}/dirapp-ai" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ steps.meta.outputs.backend }}:latest
            ${{ steps.meta.outputs.backend }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ steps.meta.outputs.backend }}:latest
          cache-to: type=inline

      - name: Build & push AI service
        uses: docker/build-push-action@v5
        with:
          context: ./ai-service
          push: true
          tags: |
            ${{ steps.meta.outputs.ai }}:latest
            ${{ steps.meta.outputs.ai }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ steps.meta.outputs.ai }}:latest
          cache-to: type=inline

  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: echo "${{ secrets.KUBECONFIG }}" | base64 -d > kubeconfig.yaml

      - name: GHCR image pull secret (same token as push)
        shell: bash
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          kubectl --kubeconfig kubeconfig.yaml create secret docker-registry ghcr-io \
            --docker-server=ghcr.io \
            --docker-username='${{ github.actor }}' \
            --docker-password="${TOKEN}" \
            -n dirapp \
            --dry-run=client -o yaml | kubectl --kubeconfig kubeconfig.yaml apply -f -

      - name: Update image tags
        shell: bash
        run: |
          set -euo pipefail
          BACKEND="${{ needs.build-and-push.outputs.backend_image }}:${{ github.sha }}"
          AI="${{ needs.build-and-push.outputs.ai_image }}:${{ github.sha }}"
          kubectl --kubeconfig kubeconfig.yaml set image \
            deployment/backend "backend=${BACKEND}" \
            -n dirapp
          kubectl --kubeconfig kubeconfig.yaml set image \
            deployment/ai-service "ai-service=${AI}" \
            -n dirapp

      - name: Wait for rollout
        run: |
          kubectl --kubeconfig kubeconfig.yaml rollout status deployment/backend -n dirapp --timeout=120s
          kubectl --kubeconfig kubeconfig.yaml rollout status deployment/ai-service -n dirapp --timeout=120s
