# Run demo seed (admin1 listings, etc.) against production Postgres.
# One-time setup: add repo secret PRODUCTION_DATABASE_URL (Render/Postgres connection string).
# Then: Actions → "Seed production DB" → Run workflow.

name: Seed production DB

on:
  workflow_dispatch:

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend deps
        working-directory: backend
        run: npm ci --omit=dev

      - name: Run demo seed
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
          POSTGRES_SSL: "true"
        run: node src/seeders/demo.js
