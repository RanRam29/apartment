services:
  - type: web
    name: apartmentapp-backend
    runtime: node
    rootDir: backend
    buildCommand: npm ci --omit=dev
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true   # Render auto-generates a secure random value
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: DATABASE_URL
        fromDatabase:
          name: apartmentapp-db
          property: connectionString
      - key: POSTGRES_SSL
        value: "true"
      # MongoDB Atlas — set manually in Render dashboard
      - key: MONGO_URI
        sync: false
      # Redis — set REDIS_URL to an Upstash/Redis Cloud URL in Render dashboard
      - key: REDIS_URL
        sync: false
      # Cloudinary — set manually in Render dashboard
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_UPLOAD_PRESET
        sync: false
      # AI / Payment keys — set manually in Render dashboard
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-flash-latest
      - key: MESHULAM_API_KEY
        sync: false
      - key: WEBHOOK_SECRET
        generateValue: true
      - key: AI_SERVICE_URL
        sync: false
      # Resend (transactional email — verification, reminders) — set manually in Render dashboard.
      # RESEND_API_KEY is required or every send throws "Missing API key" and emails fail silently.
      # RESEND_FROM_EMAIL must use a domain verified in Resend (e.g. noreply@dirapp.co.il);
      # until the domain is verified, use onboarding@resend.dev (Resend's pre-verified sender).
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      # Public web base URL used for links inside emails (verification, etc.).
      # Falls back to CLIENT_ORIGINS if unset; set explicitly to be safe.
      - key: APP_BASE_URL
        sync: false
      # Browsers may send Origin from the Vercel web build; merge with any CLIENT_ORIGIN in the dashboard
      - key: CLIENT_ORIGINS
        value: https://apartment-olive.vercel.app
      # Enable demo seed on first deploy (auto-seeds 22 listings + demo accounts)
      - key: DEMO_SEED_ENABLED
        value: "true"

databases:
  - name: apartmentapp-db
    databaseName: apartment_db
    user: apartment_user
    plan: free
